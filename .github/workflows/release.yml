# Builds binaries and uploads them to a GitHub release when a v* tag is pushed.
name: Publish release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
  build:
    name: Build release binaries
    runs-on: ${{ matrix.runner-os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - runner-os: ubuntu-24.04 # current challenge server target
            rustc-target: "x86_64-unknown-linux-gnu"
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v1.94.1
        with:
          toolchain: stable
      - name: Build
        run: |
          cargo build --release
      - name: Create tarball
        run: |
          mkdir out
          cp target/release/oci-interceptor out/
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md out/
          cd out && tar czf oci-interceptor_${suffix}.tar.gz *
        env:
          suffix: ${{ matrix.rustc-target }}
      - name: Upload tarball
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: out/*.tar.gz
